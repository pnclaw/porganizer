name: Build Windows Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-installer:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Extract version
        shell: bash
        run: |
          REF="${{ github.ref_name }}"
          if [[ "$REF" == v* ]]; then
            APP_VERSION="${REF#v}"
          else
            APP_VERSION="0.0.0"
          fi
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "22"

      - name: Build frontend
        shell: bash
        run: |
          cd src/porganizer.Frontend
          npm ci
          npm run build
          mkdir -p ../../src/porganizer.Api/wwwroot
          cp -r dist/. ../../src/porganizer.Api/wwwroot/

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: "10.0.x"

      - name: Publish (win-x64 self-contained)
        shell: bash
        run: |
          dotnet publish src/porganizer.Api/porganizer.Api.csproj \
            -r win-x64 \
            --self-contained true \
            -c Release \
            -o installer/publish

      - name: Install NSIS
        run: choco install nsis --yes

      - name: Build installer
        shell: pwsh
        run: |
          Set-Location installer
          & "C:\Program Files (x86)\NSIS\makensis.exe" "/DAPP_VERSION=${{ env.APP_VERSION }}" setup.nsi

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: installer
          path: installer/PrivateMediaManager-*.exe

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: installer/PrivateMediaManager-*.exe
